name: Bug report
description: Report a problem with a Barberfish beta
labels: [bug]
body:
  - type: dropdown
    id: karoo
    attributes:
      label: Karoo model
      options:
        - Karoo 2
        - Karoo 3
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Beta version
      description: Karoo home → Extensions → tap Barberfish (on the left) → scroll down to Version.
      placeholder: "e.g. 4.0.0-beta1"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect, and what did you see instead? Steps to reproduce help a lot.
    validations:
      required: true
